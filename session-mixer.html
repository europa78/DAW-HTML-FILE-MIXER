<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SESSIONMIX</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-0:#06080c;--bg-1:#0c0f15;--bg-2:#12151e;--bg-3:#1a1e2a;
  --bg-4:#232838;--border:#1a1e2d;--border-hi:#282e42;
  --text-0:#e4e8f0;--text-1:#98a0b8;--text-2:#5c6480;--text-3:#363e56;
  --accent:#00ffd5;--accent-dim:#00ffd533;
  --ch0:#ff3858;--ch1:#ff8c20;--ch2:#30e868;--ch3:#3898ff;
  --hot:#ff2040;--warm:#ffaa00;
}
html,body{height:100%;width:100%;background:var(--bg-0);color:var(--text-0);
  font-family:'JetBrains Mono',monospace;overflow:hidden;user-select:none}

#app{display:grid;grid-template-rows:48px 36px 1fr 200px;height:100vh;width:100vw}

/* TRANSPORT */
#transport{display:flex;align-items:center;padding:0 16px;gap:12px;
  background:var(--bg-1);border-bottom:1px solid var(--border);z-index:200}
.logo{font-family:'Outfit',sans-serif;font-weight:800;font-size:17px;
  letter-spacing:4px;color:var(--text-0);white-space:nowrap}
.logo span{color:var(--accent)}
.ver{font-size:7px;color:var(--text-3);letter-spacing:2px;margin-left:-4px;align-self:flex-start;margin-top:6px}

.t-group{display:flex;align-items:center;gap:3px;background:var(--bg-2);
  border:1px solid var(--border);border-radius:8px;padding:3px}
.t-btn{height:32px;border:none;border-radius:5px;background:transparent;
  color:var(--text-2);cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:all .12s;font-family:inherit;padding:0}
.t-btn:hover{background:var(--bg-3);color:var(--text-1)}
.t-btn.play-btn{width:56px;font-size:14px;gap:4px}
.t-btn.play-btn.playing{background:var(--accent);color:var(--bg-0)}
.t-btn.stop-btn{width:36px;font-size:13px}
.t-btn.stop-btn:hover{background:var(--hot);color:#fff}

.bpm-box{display:flex;align-items:center;gap:4px;background:var(--bg-2);
  border:1px solid var(--border);border-radius:8px;padding:0 10px;height:38px}
.bpm-box button{background:none;border:none;color:var(--text-3);cursor:pointer;
  font-size:16px;font-family:inherit;padding:0 2px;line-height:1}
.bpm-box button:hover{color:var(--accent)}
.bpm-val{font-size:17px;font-weight:600;color:var(--accent);min-width:38px;text-align:center}
.bpm-unit{font-size:7px;color:var(--text-3);letter-spacing:2px}

.pos-display{background:var(--bg-0);border:1px solid var(--border);border-radius:8px;
  padding:5px 16px;font-variant-numeric:tabular-nums;min-width:90px;text-align:center}
.pos-display .bar{font-size:18px;font-weight:600;color:var(--accent)}
.pos-display .sep{color:var(--text-3);margin:0 2px;font-size:14px}
.pos-display .beat{font-size:18px;font-weight:600;color:var(--accent);opacity:.7}

.spacer{flex:1}
.status{font-size:8px;color:var(--text-3);letter-spacing:2px;text-transform:uppercase}

/* CHANNEL TABS */
#ch-tabs{display:flex;align-items:stretch;background:var(--bg-1);
  border-bottom:1px solid var(--border);padding:0 8px;gap:4px}
.ch-tab{display:flex;align-items:center;gap:8px;padding:0 16px;
  font-size:10px;letter-spacing:1px;color:var(--text-2);
  cursor:pointer;transition:all .12s;position:relative;border-radius:6px 6px 0 0}
.ch-tab:hover{background:var(--bg-2);color:var(--text-1)}
.ch-tab.active{background:var(--bg-2);color:var(--text-0)}
.ch-tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px}
.ch-tab[data-c="0"] .ind{background:var(--ch0)}.ch-tab[data-c="0"].active::after{background:var(--ch0)}
.ch-tab[data-c="1"] .ind{background:var(--ch1)}.ch-tab[data-c="1"].active::after{background:var(--ch1)}
.ch-tab[data-c="2"] .ind{background:var(--ch2)}.ch-tab[data-c="2"].active::after{background:var(--ch2)}
.ch-tab[data-c="3"] .ind{background:var(--ch3)}.ch-tab[data-c="3"].active::after{background:var(--ch3)}
.ch-tab .ind{width:7px;height:7px;border-radius:50%;opacity:.4;transition:all .2s}
.ch-tab.loaded .ind{opacity:1;box-shadow:0 0 8px currentColor}
.ch-tab .ch-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
.ch-tab .unload{opacity:0;font-size:14px;color:var(--text-3);margin-left:4px;transition:opacity .15s}
.ch-tab:hover .unload{opacity:.6}
.ch-tab .unload:hover{color:var(--hot)!important;opacity:1!important}
.ch-tab .hotkey{font-size:8px;padding:1px 4px;background:var(--bg-3);
  border:1px solid var(--border-hi);border-radius:3px;color:var(--text-3);margin-left:2px}

/* IFRAME STACK — ALL iframes always alive, CSS stacking only */
#frame-stack{position:relative;flex:1;overflow:hidden;background:var(--bg-0)}
#frame-stack iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;background:var(--bg-0)}
#frame-stack iframe.behind{pointer-events:none;visibility:hidden}
#frame-stack iframe.front{pointer-events:auto;visibility:visible;z-index:10}

.empty-prompt{position:absolute;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;color:var(--text-3);z-index:5}
.empty-prompt .icon{font-size:40px;opacity:.25}
.empty-prompt p{font-size:10px;letter-spacing:1px;text-align:center;line-height:2;max-width:420px}
.empty-prompt code{font-size:9px;background:var(--bg-3);padding:2px 8px;border-radius:4px;
  color:var(--accent);display:inline-block;margin-top:4px}

/* MIXER */
#mixer{display:flex;background:var(--bg-1);border-top:2px solid var(--border-hi);
  padding:0 4px;overflow-x:auto;z-index:100}
.strip{display:flex;flex-direction:column;align-items:center;
  padding:6px 8px 4px;min-width:78px;border-right:1px solid var(--border);
  gap:3px;transition:opacity .2s}
.strip.dimmed{opacity:.2;pointer-events:none}
.strip.master-strip{min-width:96px;border-right:none;border-left:2px solid var(--border-hi);
  padding-left:14px;margin-left:4px}
.strip-label{font-size:8px;letter-spacing:2px;font-weight:600}

.load-btn{font-size:7px;letter-spacing:1px;padding:2px 8px;
  background:var(--bg-3);border:1px solid var(--border-hi);border-radius:3px;
  color:var(--text-2);cursor:pointer;transition:all .12s;
  max-width:66px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  text-align:center;font-family:inherit}
.load-btn:hover{border-color:var(--accent);color:var(--accent)}
.load-btn.has-file{color:var(--text-1)}

.pan-row{display:flex;flex-direction:column;align-items:center;gap:1px}
.pan-knob{width:22px;height:22px;border-radius:50%;
  background:conic-gradient(from 180deg,#181c28 0deg,#252a3a 360deg);
  border:2px solid var(--border-hi);position:relative;cursor:ns-resize;touch-action:none}
.pan-dot{position:absolute;top:50%;left:50%;width:2px;height:7px;
  border-radius:1px;transform-origin:center 0}
.pan-lbl{font-size:7px;color:var(--text-3)}

.sm-row{display:flex;gap:3px}
.sm{width:20px;height:15px;border-radius:3px;font-size:7px;font-weight:700;
  border:1px solid var(--border-hi);background:var(--bg-3);color:var(--text-3);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-family:inherit;padding:0;transition:all .1s}
.sm.s-on{background:var(--warm);color:var(--bg-0);border-color:var(--warm)}
.sm.m-on{background:var(--hot);color:#fff;border-color:var(--hot)}

.fader-col{display:flex;align-items:flex-end;gap:2px;flex:1}
canvas.vu{width:5px;image-rendering:pixelated}
.fader{width:26px;height:106px;background:var(--bg-0);border-radius:4px;
  border:1px solid var(--border);position:relative;cursor:ns-resize;touch-action:none}
.f-groove{position:absolute;left:50%;top:7px;bottom:7px;width:2px;
  background:var(--border);transform:translateX(-50%);border-radius:1px}
.f-fill{position:absolute;left:50%;bottom:7px;width:2px;border-radius:1px;
  transform:translateX(-50%);transition:height .04s}
.f-knob{position:absolute;left:2px;right:2px;height:14px;
  background:linear-gradient(180deg,#4a4e5a 0%,#333640 50%,#4a4e5a 100%);
  border-radius:3px;border:1px solid #5a5e6a;
  transform:translateY(-50%);display:flex;align-items:center;justify-content:center;
  transition:top .04s}
.f-line{width:12px;height:1px;border-radius:1px}
.db-val{font-size:8px;color:var(--text-2);font-variant-numeric:tabular-nums;text-align:center}
</style>
</head>
<body>
<div id="app">
  <div id="transport">
    <div class="logo">SESSION<span>MIX</span></div>
    <div class="ver">v2</div>
    <div class="t-group">
      <button class="t-btn stop-btn" id="btn-stop" title="Stop [Esc]">■</button>
      <button class="t-btn play-btn" id="btn-play" title="Play/Pause [Space]">▶ PLAY</button>
    </div>
    <div class="bpm-box">
      <button id="bpm-dn" title="BPM −1 [↓]">−</button>
      <span class="bpm-val" id="bpm-val">120</span>
      <button id="bpm-up" title="BPM +1 [↑]">+</button>
      <span class="bpm-unit">BPM</span>
    </div>
    <div class="pos-display">
      <span class="bar" id="p-bar">01</span><span class="sep">.</span><span class="beat" id="p-beat">1</span>
    </div>
    <div class="spacer"></div>
    <div class="status" id="status">■ STOPPED</div>
  </div>
  <div id="ch-tabs"></div>
  <div id="frame-stack">
    <div class="empty-prompt" id="empty-prompt">
      <div class="icon">⊞</div>
      <p>LOAD YOUR HTML AUDIO APPS INTO CHANNELS 1–4<br>
      PRESS ▶ PLAY TO START ALL APPS SIMULTANEOUSLY<br>
      SWITCH VIEWS WITH TABS OR KEYS 1–4<br>
      ALL CHANNELS STAY LIVE WHEN SWITCHING<br><br>
      OPTIONAL SYNC HOOK FOR YOUR APPS:<br>
      <code>window.addEventListener('sessionmix:transport', e =&gt; { ... })</code></p>
    </div>
  </div>
  <div id="mixer"></div>
</div>

<input type="file" id="fi-0" accept=".html,.htm" style="display:none">
<input type="file" id="fi-1" accept=".html,.htm" style="display:none">
<input type="file" id="fi-2" accept=".html,.htm" style="display:none">
<input type="file" id="fi-3" accept=".html,.htm" style="display:none">

<script>
const N=4;
const HEX=['#ff3858','#ff8c20','#30e868','#3898ff'];
const NAMES=['CH 1','CH 2','CH 3','CH 4'];

/* ═══ BRIDGE SCRIPT — injected into every loaded HTML app ═══
   Patches AudioContext so parent mixer controls gain & reads levels.
   Auto-detects play/stop buttons and triggers them on transport commands.
   All iframes stay alive (never display:none) so audio never gets throttled. */
const BRIDGE=`<`+`script>
(function(){
  var _AC=window.AudioContext||window.webkitAudioContext;
  if(!_AC)return;
  var _b={ctxs:[],gains:[],anls:[],tid:null};

  function PAC(){
    var c=new _AC();
    var g=c.createGain();
    var a=c.createAnalyser();
    a.fftSize=256;
    g.connect(a);a.connect(c.destination);
    var _d=c.destination;
    var _oc=AudioNode.prototype.connect;
    AudioNode.prototype.connect=function(t){
      if(t===_d)return _oc.call(this,g);
      return _oc.apply(this,arguments);
    };
    _b.ctxs.push(c);_b.gains.push(g);_b.anls.push(a);
    if(!_b.tid){
      _b.tid=setInterval(function(){
        var mx=0;
        for(var i=0;i<_b.anls.length;i++){
          var d=new Uint8Array(_b.anls[i].frequencyBinCount);
          _b.anls[i].getByteTimeDomainData(d);
          var s=0;for(var j=0;j<d.length;j++){var v=(d[j]-128)/128;s+=v*v;}
          var r=Math.sqrt(s/d.length);if(r>mx)mx=r;
        }
        try{window.parent.postMessage({type:'SM_LVL',level:mx},'*');}catch(e){}
      },45);
    }
    return c;
  }
  PAC.prototype=_AC.prototype;
  window.AudioContext=PAC;
  if(window.webkitAudioContext)window.webkitAudioContext=PAC;

  window.addEventListener('message',function(e){
    var d=e.data;if(!d||!d.type)return;
    if(d.type==='SM_GAIN'){_b.gains.forEach(function(g){g.gain.value=d.v;});}
    if(d.type==='SM_RESUME'){_b.ctxs.forEach(function(c){if(c.state==='suspended')c.resume();});}
    if(d.type==='SM_TRANSPORT'){
      window.dispatchEvent(new CustomEvent('sessionmix:transport',{
        detail:{action:d.action,bpm:d.bpm,bar:d.bar,beat:d.beat}
      }));
      if(d.action==='play'||d.action==='stop')autoTrigger(d.action);
      if(d.action==='play')_b.ctxs.forEach(function(c){if(c.state==='suspended')c.resume();});
    }
  });

  function autoTrigger(action){
    var btns=document.querySelectorAll('button,[role=button],.play-btn,.stop-btn,.start-btn,[data-action]');
    var pw=['play','start','\\u25b6','\\u25ba','\\u23f5'];
    var sw=['stop','\\u25a0','\\u23f9','pause','\\u275a\\u275a','\\u23f8'];
    var tgts=action==='play'?pw:sw;
    for(var i=0;i<btns.length;i++){
      var txt=(btns[i].textContent||'').toLowerCase().trim();
      var cls=(btns[i].className||'').toLowerCase();
      var bid=(btns[i].id||'').toLowerCase();
      for(var j=0;j<tgts.length;j++){
        if(txt.indexOf(tgts[j])!==-1||cls.indexOf(tgts[j])!==-1||bid.indexOf(tgts[j])!==-1){
          btns[i].click();return;
        }
      }
    }
    if(action==='play'){
      document.dispatchEvent(new KeyboardEvent('keydown',{key:' ',code:'Space',keyCode:32,bubbles:true}));
      document.dispatchEvent(new KeyboardEvent('keyup',{key:' ',code:'Space',keyCode:32,bubbles:true}));
    }
  }
  window.__SMB=_b;
})();
<`+`/script>`;

// ─── State ───
const ch=Array.from({length:N},()=>({
  loaded:false,name:'',blob:null,iframe:null,
  gain:.75,pan:0,muted:false,soloed:false,level:0,decay:0
}));
let masterGain=.8,activeTab=-1;
let playing=false,bpm=120,bar=1,beat=1,tick=0,tTimer=null;

const $=id=>document.getElementById(id);

// ═══ BUILD MIXER ═══
function buildMixer(){
  const mx=$('mixer');mx.innerHTML='';
  for(let i=0;i<N;i++){
    const s=document.createElement('div');
    s.className='strip';s.id=`s${i}`;
    s.innerHTML=`
      <div class="strip-label" style="color:${HEX[i]}">${NAMES[i]}</div>
      <div class="load-btn" id="lb${i}">LOAD .HTML</div>
      <div class="pan-row">
        <div class="pan-knob" id="pk${i}"><div class="pan-dot" id="pd${i}" style="background:${HEX[i]}"></div></div>
        <div class="pan-lbl" id="pl${i}">C</div>
      </div>
      <div class="sm-row">
        <div class="sm" id="so${i}">S</div>
        <div class="sm" id="mu${i}">M</div>
      </div>
      <div class="fader-col">
        <canvas class="vu" id="v1${i}" width="5" height="106"></canvas>
        <div class="fader" id="fd${i}">
          <div class="f-groove"></div>
          <div class="f-fill" id="ff${i}" style="background:${HEX[i]}"></div>
          <div class="f-knob" id="fk${i}"><div class="f-line" style="background:${HEX[i]}"></div></div>
        </div>
        <canvas class="vu" id="v2${i}" width="5" height="106"></canvas>
      </div>
      <div class="db-val" id="dv${i}">${Math.round(ch[i].gain*100)}</div>`;
    mx.appendChild(s);
    $(`lb${i}`).onclick=()=>$(`fi-${i}`).click();
    $(`fi-${i}`).onchange=e=>loadApp(i,e);
    $(`so${i}`).onclick=()=>togSolo(i);
    $(`mu${i}`).onclick=()=>togMute(i);
    mkFader(i);mkPan(i);
  }
  // Master
  const m=document.createElement('div');
  m.className='strip master-strip';
  m.innerHTML=`
    <div class="strip-label" style="color:var(--accent)">MASTER</div>
    <div style="height:20px"></div><div style="height:24px"></div><div style="height:18px"></div>
    <div class="fader-col">
      <canvas class="vu" id="vm1" width="5" height="106"></canvas>
      <div class="fader" id="fdm">
        <div class="f-groove"></div>
        <div class="f-fill" id="ffm" style="background:var(--accent)"></div>
        <div class="f-knob" id="fkm"><div class="f-line" style="background:var(--accent)"></div></div>
      </div>
      <canvas class="vu" id="vm2" width="5" height="106"></canvas>
    </div>
    <div class="db-val" id="dvm">${Math.round(masterGain*100)}</div>`;
  mx.appendChild(m);
  mkMasterFader();
}

// ═══ FADER / PAN ═══
function mkFader(i){setTimeout(()=>{
  const t=$(`fd${i}`);if(!t)return;let on=false;
  const up=e=>{const r=t.getBoundingClientRect();
    ch[i].gain=Math.max(0,Math.min(1,1-((e.clientY||e.touches?.[0]?.clientY)-r.top)/r.height));
    renderF(i);sendGain(i);};
  t.onpointerdown=e=>{on=true;t.setPointerCapture(e.pointerId);up(e)};
  t.onpointermove=e=>{if(on)up(e)};t.onpointerup=()=>{on=false};
},60);}
function mkMasterFader(){setTimeout(()=>{
  const t=$('fdm');if(!t)return;let on=false;
  const up=e=>{const r=t.getBoundingClientRect();
    masterGain=Math.max(0,Math.min(1,1-((e.clientY||e.touches?.[0]?.clientY)-r.top)/r.height));
    renderMF();for(let i=0;i<N;i++)sendGain(i);};
  t.onpointerdown=e=>{on=true;t.setPointerCapture(e.pointerId);up(e)};
  t.onpointermove=e=>{if(on)up(e)};t.onpointerup=()=>{on=false};
},60);}
function mkPan(i){setTimeout(()=>{
  const k=$(`pk${i}`);if(!k)return;let on=false,sy=0,sv=0;
  k.onpointerdown=e=>{on=true;sy=e.clientY;sv=ch[i].pan;k.setPointerCapture(e.pointerId)};
  k.onpointermove=e=>{if(!on)return;ch[i].pan=Math.max(-1,Math.min(1,sv+(sy-e.clientY)*.012));renderP(i)};
  k.onpointerup=()=>{on=false};k.ondblclick=()=>{ch[i].pan=0;renderP(i)};
},60);}

function renderF(i){const v=ch[i].gain;
  const ff=$(`ff${i}`),fk=$(`fk${i}`),dv=$(`dv${i}`);
  if(ff)ff.style.height=(v*92)+'px';if(fk)fk.style.top=((1-v)*100)+'%';
  if(dv)dv.textContent=Math.round(v*100);}
function renderMF(){const v=masterGain;
  const ff=$('ffm'),fk=$('fkm'),dv=$('dvm');
  if(ff)ff.style.height=(v*92)+'px';if(fk)fk.style.top=((1-v)*100)+'%';
  if(dv)dv.textContent=Math.round(v*100);}
function renderP(i){const v=ch[i].pan;
  const pd=$(`pd${i}`),pl=$(`pl${i}`);
  if(pd)pd.style.transform=`translate(-50%,0) rotate(${v*135}deg)`;
  if(pl)pl.textContent=v===0?'C':v<0?'L'+Math.abs(Math.round(v*50)):'R'+Math.round(v*50);}
function renderAll(){for(let i=0;i<N;i++){renderF(i);renderP(i);}renderMF();}

// ═══ VU METERS ═══
function drawVU(id,level,color){
  const c=$(id);if(!c)return;const ctx=c.getContext('2d');
  const w=5,h=106,dpr=window.devicePixelRatio||1;
  c.width=w*dpr;c.height=h*dpr;c.style.width=w+'px';c.style.height=h+'px';
  ctx.scale(dpr,dpr);
  const db=Math.min(1,level*4.5);const segs=Math.floor(h/3.5);
  const filled=Math.floor(db*segs);ctx.clearRect(0,0,w,h);
  for(let i=0;i<segs;i++){const y=h-(i+1)*3.5;const r=i/segs;
    let col=color;if(r>.85)col='#ff2040';else if(r>.7)col='#ffaa00';
    ctx.globalAlpha=i<filled?1:.06;ctx.fillStyle=col;ctx.fillRect(0,y,w,2);}
  ctx.globalAlpha=1;}

// ═══ SOLO / MUTE ═══
function togSolo(i){ch[i].soloed=!ch[i].soloed;
  $(`so${i}`).className='sm'+(ch[i].soloed?' s-on':'');
  updateDim();for(let j=0;j<N;j++)sendGain(j);}
function togMute(i){ch[i].muted=!ch[i].muted;
  $(`mu${i}`).className='sm'+(ch[i].muted?' m-on':'');
  updateDim();sendGain(i);}
function updateDim(){const any=ch.some(c=>c.soloed);
  for(let i=0;i<N;i++){const dim=ch[i].muted||(any&&!ch[i].soloed);
    $(`s${i}`).className='strip'+(dim?' dimmed':'');}}

// ═══ SEND GAIN TO IFRAME ═══
function sendGain(i){if(!ch[i].iframe)return;
  const any=ch.some(c=>c.soloed);const dim=ch[i].muted||(any&&!ch[i].soloed);
  const v=dim?0:ch[i].gain*masterGain;
  try{ch[i].iframe.contentWindow.postMessage({type:'SM_GAIN',v},'*');}catch(e){}}

// ═══ LOAD HTML APP ═══
async function loadApp(i,ev){
  const file=ev.target.files[0];if(!file)return;
  const html=await file.text();
  let mod;const hi=html.indexOf('<head');
  if(hi!==-1){const ci=html.indexOf('>',hi);
    mod=html.slice(0,ci+1)+'\n'+BRIDGE+'\n'+html.slice(ci+1);
  }else{mod=BRIDGE+'\n'+html;}

  if(ch[i].blob)URL.revokeObjectURL(ch[i].blob);
  if(ch[i].iframe)ch[i].iframe.remove();

  const blob=URL.createObjectURL(new Blob([mod],{type:'text/html'}));
  const ifr=document.createElement('iframe');
  ifr.src=blob;
  ifr.setAttribute('sandbox','allow-scripts allow-same-origin allow-popups');
  ifr.setAttribute('allow','autoplay; midi; microphone');
  ifr.className='behind';
  ifr.id=`ifr-${i}`;
  $('frame-stack').appendChild(ifr);

  ch[i].loaded=true;ch[i].name=file.name.replace(/\.html?$/i,'');
  ch[i].blob=blob;ch[i].iframe=ifr;

  const lb=$(`lb${i}`);lb.textContent=ch[i].name.substring(0,10);
  lb.classList.add('has-file');lb.title=file.name;

  ifr.onload=()=>{
    sendGain(i);
    try{ifr.contentWindow.postMessage({type:'SM_RESUME'},'*');}catch(e){}
    if(playing){try{ifr.contentWindow.postMessage({
      type:'SM_TRANSPORT',action:'play',bpm,bar,beat},'*');}catch(e){}}
  };
  buildTabs();switchTo(i);
  $('empty-prompt').style.display='none';updStatus();
}

// ═══ TABS + CHANNEL SWITCHING ═══
function buildTabs(){
  const el=$('ch-tabs');el.innerHTML='';
  for(let i=0;i<N;i++){
    const t=document.createElement('div');
    t.className='ch-tab'+(ch[i].loaded?' loaded':'')+(activeTab===i?' active':'');
    t.setAttribute('data-c',i);
    const label=ch[i].loaded?`${NAMES[i]}: ${ch[i].name}`:NAMES[i];
    t.innerHTML=`<div class="ind"></div><span class="ch-name">${label}</span><span class="hotkey">${i+1}</span>`
      +(ch[i].loaded?`<span class="unload" data-x="${i}">×</span>`:'');
    t.onclick=e=>{
      if(e.target.dataset.x!==undefined){unloadApp(+e.target.dataset.x);return;}
      if(ch[i].loaded)switchTo(i); else $(`fi-${i}`).click();
      buildTabs();
    };
    el.appendChild(t);
  }
}

function switchTo(i){
  activeTab=i;
  /* KEY ARCHITECTURE: All iframes stay alive. We only toggle pointer-events
     and visibility. Audio keeps playing in background iframes. */
  for(let j=0;j<N;j++){
    if(!ch[j].iframe)continue;
    ch[j].iframe.className = j===i ? 'front' : 'behind';
  }
  buildTabs();
}

function unloadApp(i){
  if(ch[i].iframe)ch[i].iframe.remove();
  if(ch[i].blob)URL.revokeObjectURL(ch[i].blob);
  ch[i]={loaded:false,name:'',blob:null,iframe:null,gain:.75,pan:0,muted:false,soloed:false,level:0,decay:0};
  $(`lb${i}`).textContent='LOAD .HTML';$(`lb${i}`).classList.remove('has-file');
  $(`so${i}`).className='sm';$(`mu${i}`).className='sm';
  renderF(i);renderP(i);updateDim();
  const next=ch.findIndex(c=>c.loaded);
  if(next>=0)switchTo(next);else{activeTab=-1;$('empty-prompt').style.display='flex';}
  buildTabs();updStatus();
}

// ═══ TRANSPORT ═══
$('btn-play').onclick=()=>{playing?doPause():doPlay()};
$('btn-stop').onclick=doStop;
$('bpm-dn').onclick=()=>{bpm=Math.max(30,bpm-1);$('bpm-val').textContent=bpm;broadcastT('bpm_change')};
$('bpm-up').onclick=()=>{bpm=Math.min(300,bpm+1);$('bpm-val').textContent=bpm;broadcastT('bpm_change')};

function doPlay(){
  playing=true;
  $('btn-play').textContent='❚❚';$('btn-play').classList.add('playing');
  broadcastT('play');updStatus();
  if(tTimer)clearTimeout(tTimer);
  const step=()=>60000/bpm/4;
  (function adv(){if(!playing)return;tick++;
    if(tick>4){tick=1;beat++;if(beat>4){beat=1;bar++;}}
    $('p-bar').textContent=String(bar).padStart(2,'0');$('p-beat').textContent=beat;
    tTimer=setTimeout(adv,step());})();
}
function doPause(){
  playing=false;clearTimeout(tTimer);
  $('btn-play').textContent='▶';$('btn-play').classList.remove('playing');
  broadcastT('pause');updStatus();
}
function doStop(){
  playing=false;clearTimeout(tTimer);bar=1;beat=1;tick=0;
  $('p-bar').textContent='01';$('p-beat').textContent='1';
  $('btn-play').textContent='▶';$('btn-play').classList.remove('playing');
  broadcastT('stop');updStatus();
}
function broadcastT(action){
  for(let i=0;i<N;i++){if(!ch[i].iframe)continue;
    try{ch[i].iframe.contentWindow.postMessage({type:'SM_TRANSPORT',action,bpm,bar,beat},'*');}catch(e){}}}
function updStatus(){const n=ch.filter(c=>c.loaded).length;
  $('status').textContent=`${playing?'▶ PLAYING':'■ STOPPED'} — ${n}/${N} APPS — ${bpm} BPM`;}

// ═══ METER MESSAGES ═══
window.addEventListener('message',e=>{
  if(!e.data||e.data.type!=='SM_LVL')return;
  for(let i=0;i<N;i++){if(ch[i].iframe&&e.source===ch[i].iframe.contentWindow){ch[i].level=e.data.level;break;}}
});

// ═══ KEYBOARD SHORTCUTS ═══
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.code==='Space'&&!e.repeat){e.preventDefault();playing?doPause():doPlay();}
  if(e.key==='Escape'){e.preventDefault();doStop();}
  if(e.key==='ArrowUp'&&!e.repeat){e.preventDefault();bpm=Math.min(300,bpm+1);$('bpm-val').textContent=bpm;broadcastT('bpm_change');}
  if(e.key==='ArrowDown'&&!e.repeat){e.preventDefault();bpm=Math.max(30,bpm-1);$('bpm-val').textContent=bpm;broadcastT('bpm_change');}
  const num=parseInt(e.key);
  if(num>=1&&num<=4){const idx=num-1;
    if(ch[idx].loaded)switchTo(idx);else $(`fi-${idx}`).click();}
});

// ═══ RENDER LOOP ═══
!function frame(){
  const any=ch.some(c=>c.soloed);
  for(let i=0;i<N;i++){ch[i].decay=Math.max(ch[i].level,ch[i].decay*.88);
    const dim=ch[i].muted||(any&&!ch[i].soloed);
    const lv=dim?0:ch[i].decay*ch[i].gain*masterGain;
    drawVU(`v1${i}`,lv,HEX[i]);drawVU(`v2${i}`,lv*.82,HEX[i]);}
  let sum=0;for(let i=0;i<N;i++){const dim=ch[i].muted||(any&&!ch[i].soloed);
    if(!dim)sum+=ch[i].decay*ch[i].gain;}
  sum=Math.min(1,sum*masterGain);
  drawVU('vm1',sum,'#00ffd5');drawVU('vm2',sum*.88,'#00ffd5');
  requestAnimationFrame(frame);
}();

// ═══ INIT ═══
buildMixer();buildTabs();renderAll();
</script>
